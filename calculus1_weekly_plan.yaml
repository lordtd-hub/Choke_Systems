      weekly_assessment_focus:
        direct_clos: ["CLO1", "CLO5"]
        assessment_ids: ["ASM-CLASSWORK"]
      expected_evidence:
        - "attendance_or_participation"
        - "activity_artifact"
        - "teaching_reflection"

