      clo_mapping:
        primary_clo: "CLO1"
        secondary_clos:
          - "CLO5"
      strategy_mapping:
        primary_strategies:
          - "STRAT-LECTURE"
          - "STRAT-WORKED-EXAMPLE"
        secondary_strategies:
          - "STRAT-PAIR"
      activities:
