      content_cluster_id: "UNIT1"
      topics:
        - "บทนำรายวิชาและแนวทางการเรียน"
        - "ทบทวนฟังก์ชันพื้นฐานและชนิดของฟังก์ชัน"
        - "โดเมนและเรนจ์"
        - "การอ่านกราฟและการแทนฟังก์ชัน"
      clo_mapping:
        primary_clo: "CLO1"
        secondary_clos:
          - "CLO5"
      strategy_mapping:
        primary_strategies:
          - "STRAT-LECTURE"
          - "STRAT-PAIR"
        secondary_strategies:
          - "STRAT-REFLECTION"
      activities:
        - activity_id: "W1-A1"
          activity_type_id: "ACT-DIAG"
          name: "Diagnostic Check: Function Readiness"
          primary_clo: "CLO1"
          secondary_clos: ["CLO5"]
          description: >
            ตรวจพื้นฐานเรื่องฟังก์ชัน การอ่านกราฟ และการแทนค่าก่อนเริ่มลิมิต
          deliverable: "diagnostic_response_sheet"
          assessment_links: ["ASM-CLASSWORK"]
          evidence_tags:
            - "readiness"
            - "baseline"
            - "function_foundation"

        - activity_id: "W1-A2"
          activity_type_id: "ACT-PAIR"
          name: "Pair Discussion: Interpreting Graphs"
          primary_clo: "CLO1"
          secondary_clos: ["CLO5"]
          description: >
            จับคู่แปลความหมายกราฟ ฟังก์ชัน และพฤติกรรมเบื้องต้น
          deliverable: "pair_discussion_notes"
          assessment_links: ["ASM-CLASSWORK"]
          evidence_tags:
            - "graph_interpretation"
            - "communication"

        - activity_id: "W1-A3"
          activity_type_id: "ACT-REFLECT"
          name: "Reflection: จุดแข็งและจุดที่ต้องทบทวน"
          primary_clo: "CLO5"
          secondary_clos: ["CLO1"]
          description: >
            นักศึกษาสะท้อนว่าตนเองพร้อมด้านใดและควรทบทวนเรื่องใด
          deliverable: "reflection_note"
          assessment_links: ["ASM-CLASSWORK"]
          evidence_tags:
            - "self_reflection"
