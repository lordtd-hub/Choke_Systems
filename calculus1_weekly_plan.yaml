    course_title_en: "Calculus 1"
    source_file: "calculus1_course.yaml"

  plan_metadata:
    semester:
      term: 1
      academic_year: 2569
    total_weeks: 15
    instructional_weeks: 14
    assessment_weeks:
      midterm_week: 8
      final_week: 15
    planning_emphasis:
      - "CLO mapping"
      - "activity-centered design"
      - "weekly evidence collection"
